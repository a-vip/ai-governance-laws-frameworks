name: Latest blog post workflow
on:
  schedule:
    # Runs every 24 hours to check for new WordPress posts
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger it to run instantly

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # Updated to fix the Node.js warning
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://aviperera.com/feed/"
          max_post_count: 100
          user_agent: "Avi-GitHub-Readme-Updater"
